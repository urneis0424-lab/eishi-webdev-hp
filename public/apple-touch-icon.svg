<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="180" height="180" rx="28" fill="url(#grad2)"/>
  
  <!-- EU monogram -->
  <text x="90" y="120" font-family="Arial, sans-serif" font-size="98" font-weight="bold" fill="white" text-anchor="middle">EU</text>
</svg>
